services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: colabers-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3333}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-docker}
      DB_DATABASE: ${DB_DATABASE:-colabers}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3333}:3333"

  db:
    image: postgres:16-alpine
    container_name: colabers-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-docker}
      POSTGRES_DB: ${DB_DATABASE:-colabers}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-colabers}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
